name: 物流周会信息同步

on:
  schedule:
    # 北京时间周三 18:00
    - cron: '0 10 * * 3'
  workflow_dispatch:

jobs:
  send-weekly-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run weekly sync
        env:
          DINGTALK_ROBOT_WEBHOOK: ${{ secrets.DINGTALK_ROBOT_WEBHOOK }}
          DINGTALK_ROBOT_SECRET: ${{ secrets.DINGTALK_ROBOT_SECRET }}
        run: python dingtalk_weekly_sync.py
